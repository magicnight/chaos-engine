services:
  chaos:
    build: .
    ports:
      - "3117:3117"
    volumes:
      - ./runs:/data/runs
    env_file: .env
    working_dir: /data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3117/api/v1/health"]
      interval: 60s
      timeout: 10s
