# CHAOS Engine + NewsPredict — Development
# CHAOS: localhost:3117, NewsPredict: localhost:3000
# Caddy/Nginx reverse proxy should be configured separately outside containers
# Usage: Use dev-start script or manually: docker compose -f docker-compose.dev.yml up -d

services:
  chaos:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - chaos_data:/data/runs
    env_file: .env
    environment:
      - DATABASE_PATH=/data/runs/chaos.db
    command: ["serve", "--port", "3117", "--public", "--api-key", "chaos-internal-key"]
    ports:
      - "3117:3117"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3117/api/v1/health"]
      interval: 60s
      timeout: 10s

  newspredict:
    build:
      context: ./newspredict
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - CHAOS_API_URL=http://chaos:3117
      - CHAOS_API_KEY=chaos-internal-key
      - DATABASE_URL=postgresql://chaos:${POSTGRES_PASSWORD:-chaos_secret}@postgres:5432/newspredict
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-chaos-dev-secret-change-me}
      - CRON_SECRET=${CRON_SECRET:-chaos-cron-dev-secret}
      - AUTH_TRUST_HOST=true
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      chaos:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chaos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chaos_secret}
      POSTGRES_DB: newspredict
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaos -d newspredict"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chaos_data:
  pg_data:
